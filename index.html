async function exportToExcel(proc,sub){
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet(proc.name||"マニュアル");
    // A4縦・印刷設定
    ws.pageSetup={paperSize:9,orientation:"portrait",fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.5,right:0.5,top:0.75,bottom:0.75,header:0.3,footer:0.3}};
    ws.pageSetup.printTitlesRow="$1:$2";
    const updDate=fmtDate(proc.updatedAt||data.updatedAt);
    ws.mergeCells("A1:D1");
    const tc=ws.getCell("A1");
    tc.value=proc.name||"マニュアル";
    tc.font={name:"メイリオ",size:14,bold:true,color:{argb:"FFFFFFFF"}};
    tc.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF1F6FEB"}};
    tc.alignment={horizontal:"center",vertical:"middle"};
    ws.getRow(1).height=32;
    ws.getCell("E1").value="更新日："+updDate;
    ws.getCell("E1").font={name:"メイリオ",size:10,color:{argb:"FF666666"}};
    ws.getCell("E1").alignment={horizontal:"right",vertical:"middle"};
    ["A2","B2","C2","D2","E2"].forEach(a=>{
      const c=ws.getCell(a);
      c.font={name:"メイリオ",size:10,bold:true,color:{argb:"FFFFFFFF"}};
      c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF334155"}};
      c.alignment={horizontal:"center",vertical:"middle"};
    });
    ws.getCell("A2").value="No."; ws.getCell("B2").value="写真";
    ws.mergeCells("C2:D2"); ws.getCell("C2").value="コメント";
    ws.getCell("E2").value="メモ（サブ手順）";
    ws.getRow(2).height=22;
    ws.getColumn(1).width=5; ws.getColumn(2).width=20;
    ws.getColumn(3).width=26; ws.getColumn(4).width=7; ws.getColumn(5).width=20;
    // 写真行は高さ100pt≒35mm。A4縦で1ページ約6〜7行が目安
    const ROW_H=100, PAGE_H=693, HEADER_H=54, ROWS_PER_PAGE=Math.floor((PAGE_H-HEADER_H)/ROW_H);
    let rowIdx=3, pageRowCount=0;
    for(let i=0;i<sub.steps.length;i++){
      const st=sub.steps[i];
      if(pageRowCount>0 && pageRowCount>=ROWS_PER_PAGE){
        ws.getRow(rowIdx-1).addPageBreak();
        pageRowCount=0;
      }
      ws.getRow(rowIdx).height=ROW_H;
      ws.getCell(`A${rowIdx}`).value=i+1;
      ws.getCell(`A${rowIdx}`).alignment={horizontal:"center",vertical:"top"};
      ws.getCell(`A${rowIdx}`).font={name:"メイリオ",size:10};
      if(st.photoId&&photoCache[st.photoId]){
        try{
          const dataUrl=photoCache[st.photoId];
          const base64=dataUrl.split(",")[1];
          const ext=dataUrl.startsWith("data:image/png")?"png":"jpeg";
          const imgId=wb.addImage({base64,extension:ext});
          ws.addImage(imgId,{tl:{col:1,row:rowIdx-1},br:{col:2,row:rowIdx},editAs:"oneCell"});
        }catch(e){}
      }
      ws.mergeCells(`C${rowIdx}:D${rowIdx}`);
      const cc=ws.getCell(`C${rowIdx}`);
      cc.value=(st.title?(st.title+"\n"):"")+(st.text||"");
      cc.alignment={wrapText:true,vertical:"top"}; cc.font={name:"メイリオ",size:10};
      const subText=(st.subSteps||[]).map((ss,j)=>`${i+1}-${j+1} ${ss.title?ss.title+": ":""}${ss.text||""}`).join("\n");
      ws.getCell(`E${rowIdx}`).value=subText||"";
      ws.getCell(`E${rowIdx}`).alignment={wrapText:true,vertical:"top"};
      ws.getCell(`E${rowIdx}`).font={name:"メイリオ",size:9};
      ["A","B","C","E"].forEach(col=>{
        ws.getCell(`${col}${rowIdx}`).border={top:{style:"thin",color:{argb:"FFE2E8F0"}},bottom:{style:"thin",color:{argb:"FFE2E8F0"}},left:{style:"thin",color:{argb:"FFE2E8F0"}},right:{style:"thin",color:{argb:"FFE2E8F0"}}};
        if(i%2===1) ws.getCell(`${col}${rowIdx}`).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF8FAFC"}};
      });
      rowIdx++; pageRowCount++;
    }
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url;
    a.download=`${proc.name||"マニュアル"}_${updDate.replace(/\//g,"-")}.xlsx`;
    a.click(); URL.revokeObjectURL(url);
    toast("Excel出力完了");
  }catch(e){ console.error(e); toast("Excel出力エラー："+e.message); }
}

/* ============================================================
   PowerPointエクスポート
   ============================================================ */
async function bakeAnnotations(dataUrl, annotations){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      cv.width=img.naturalWidth; cv.height=img.naturalHeight;
      const ctx=cv.getContext('2d');
      ctx.drawImage(img,0,0);
      const iw=cv.width, ih=cv.height, base=Math.min(iw,ih);
      (annotations||[]).forEach(a=>{
        const sizePx=Math.max(14,(a.size/100)*base);
        const x=(a.x/100)*iw, y=(a.y/100)*ih;
        ctx.strokeStyle='#ff2222'; ctx.fillStyle='#ff2222';
        if(a.type==='circle'){
          const r=sizePx/2;
          ctx.lineWidth=Math.max(2,base*0.006);
          ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.stroke();
        } else if(a.type==='rect'){
          const wp=Math.max(20,(a.size/100)*iw), hp=Math.max(10,wp*0.6*(a.hRatio||1));
          ctx.lineWidth=Math.max(2,base*0.005);
          ctx.strokeRect(x,y,wp,hp);
        } else if(a.type==='num'){
          const r=sizePx/2;
          ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff';
          ctx.font=`bold ${Math.round(sizePx*0.55)}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(a.text||'',x+r,y+r);
          ctx.textAlign='left'; ctx.textBaseline='alphabetic';
          ctx.fillStyle='#ff2222';
        } else if(a.type==='text'){
          ctx.font=`bold ${Math.round(sizePx)}px sans-serif`;
          ctx.shadowColor='rgba(255,255,255,.85)'; ctx.shadowBlur=3;
          ctx.fillText(a.text||'',x,y+sizePx); ctx.shadowBlur=0;
        } else if(a.type==='arrow'){
          ctx.font=`${Math.round(sizePx*1.4)}px sans-serif`;
          ctx.shadowColor='rgba(255,255,255,.85)'; ctx.shadowBlur=3;
          ctx.fillText('➜',x,y+sizePx*1.4); ctx.shadowBlur=0;
        }
      });
      resolve({dataUrl:cv.toDataURL('image/jpeg',0.92),w:iw,h:ih});
    };
    img.src=dataUrl;
  });
}

async function exportToPptx(proc,sub,mod){
  hideSheets();
  toast('PowerPoint作成中…');
  try{
    if(typeof PptxGenJS==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
        s.onload=res; s.onerror=()=>rej(new Error('ライブラリの読み込みに失敗'));
        document.head.appendChild(s);
      });
    }
    const pptx=new PptxGenJS();
    pptx.defineLayout({name:'A4P',width:7.48,height:10.58});
    pptx.layout='A4P';
    const updDate=fmtDate(proc.updatedAt||data.updatedAt);
    const steps=sub.steps||[];

    // ── タイトルスライド ──
    {
      const sl=pptx.addSlide();
      sl.background={color:'F1F5F9'};
      sl.addShape('rect',{x:0,y:3.2,w:7.48,h:3.2,fill:{color:'1F6FEB'}});
      sl.addText(mod.title,{x:0.5,y:3.35,w:6.48,h:0.5,fontSize:12,color:'CCE4FF',align:'center',valign:'middle'});
      sl.addText(proc.name,{x:0.5,y:3.9,w:6.48,h:1.4,fontSize:24,bold:true,color:'FFFFFF',align:'center',valign:'middle'});
      sl.addText(`更新日：${updDate}　　全 ${steps.length} 手順`,{x:0.5,y:5.5,w:6.48,h:0.4,fontSize:11,color:'CCE4FF',align:'center'});
    }

    // ── 手順スライド（1手順=1スライド）──
    for(let i=0;i<steps.length;i++){
      const st=steps[i];
      const sl=pptx.addSlide();
      sl.background={color:'FFFFFF'};

      // タイトルバー
      sl.addShape('rect',{x:0,y:0,w:7.48,h:0.52,fill:{color:'1F6FEB'}});
      sl.addText(`${i+1}`,{x:0.12,y:0,w:0.5,h:0.52,fontSize:18,bold:true,color:'FFFFFF',valign:'middle'});
      sl.addText(st.title||'（タイトルなし）',{x:0.65,y:0,w:5.8,h:0.52,fontSize:14,bold:true,color:'FFFFFF',valign:'middle'});
      sl.addText(`${i+1} / ${steps.length}`,{x:6.5,y:0,w:0.9,h:0.52,fontSize:9,color:'CCE4FF',align:'right',valign:'middle'});

      const footerY=10.22;
      let cy=0.62;

      // 写真（アノテーション焼き込み）
      if(st.photoId&&photoCache[st.photoId]){
        const baked=await bakeAnnotations(photoCache[st.photoId],st.annotations||[]);
        const maxW=7.08,maxH=5.0;
        const scale=Math.min(maxW/baked.w,maxH/baked.h);
        const dw=baked.w*scale, dh=baked.h*scale;
        const ix=(7.48-dw)/2;
        sl.addImage({data:baked.dataUrl,x:ix,y:cy,w:dw,h:dh});
        cy+=dh+0.18;
      }

      // 説明テキスト
      if(st.text&&cy<footerY-0.5){
        const th=Math.min(1.6,footerY-cy-0.1);
        sl.addText(st.text,{x:0.2,y:cy,w:7.08,h:th,fontSize:11,color:'1e293b',valign:'top',wrap:true});
        cy+=th;
      }

      // サブ手順
      if(st.subSteps&&st.subSteps.length>0&&cy<footerY-0.3){
        const remH=footerY-cy-0.1;
        const runs=[];
        st.subSteps.forEach((ss,j)=>{
          if(j>0) runs.push({text:'\n',options:{fontSize:4}});
          runs.push({text:`${i+1}-${j+1}  ${ss.title||''}`,options:{bold:true,fontSize:10.5,color:'1e293b'}});
          if(ss.text) runs.push({text:`\n   ${ss.text}`,options:{fontSize:10,color:'475569'}});
        });
        sl.addText(runs,{x:0.2,y:cy,w:7.08,h:remH,fontSize:10.5,valign:'top',wrap:true});
      }

      // フッター
      sl.addShape('rect',{x:0.15,y:footerY,w:7.18,h:0.008,fill:{color:'CBD5E1'},line:{color:'CBD5E1',width:0}});
      sl.addText(`${mod.title}　${proc.name}　更新日：${updDate}`,{
        x:0.15,y:footerY+0.02,w:7.18,h:0.3,fontSize:8,color:'94A3B8',align:'center'});
    }

    // ── 出力 ──
    const updStr=updDate.replace(/\//g,'-');
    const fileName=`${mod.title}_${proc.name}_${updStr}.pptx`;
    const blob=await pptx.write('blob');
    const file=new File([blob],fileName,{type:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:fileName});
    } else {
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=fileName; a.click();
      URL.revokeObjectURL(url);
    }
    toast('PowerPoint出力完了');
  }catch(e){
    if(e.name!=='AbortError'){ console.error(e); toast('PowerPoint出力エラー：'+e.message); }
  }
}
