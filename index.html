/* ===== タブ長押し並び替え（挿入マーカー方式） ===== */
(()=>{
  const bar=$("tabbar");
  let dragPid=null, origBtn=null, origIdx=-1, dropIdx=-1;
  let indicator=null;
  let lpt=null, touchSX=0, touchSY=0;

  const getTabs=()=>Array.from(bar.querySelectorAll('[data-pid]'));
  const cancelLP=()=>{ if(lpt){clearTimeout(lpt);lpt=null;} };

  function enter(btn,cx,cy){
    if(navigator.vibrate) navigator.vibrate(40);
    dragPid=btn.dataset.pid;
    origBtn=btn;
    origIdx=data.processes.findIndex(p=>p.id===dragPid);
    dropIdx=origIdx;

    // 挿入マーカー（縦線）
    indicator=document.createElement('div');
    indicator.className='tab-insert-indicator';
    bar.style.position='relative';
    bar.appendChild(indicator);

    btn.classList.add('dragging-src');

    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd,{once:true});
    document.addEventListener('touchcancel',onEnd,{once:true});
    updateIndicator(cx);
  }

  function updateIndicator(cx){
    const tabs=getTabs().filter(t=>t!==origBtn);
    const barRect=bar.getBoundingClientRect();
    let insertBefore=-1; // -1 = 末尾
    for(let i=0;i<tabs.length;i++){
      const r=tabs[i].getBoundingClientRect();
      if(cx < r.left+r.width/2){ insertBefore=i; break; }
    }
    // 挿入マーカーの位置
    let lineLeft;
    if(insertBefore===0){
      lineLeft=tabs[0].getBoundingClientRect().left - barRect.left - 6;
    } else if(insertBefore>0){
      const prev=tabs[insertBefore-1].getBoundingClientRect();
      lineLeft=prev.right - barRect.left + 3;
    } else {
      const last=tabs[tabs.length-1];
      lineLeft=(last?last.getBoundingClientRect().right - barRect.left + 3:4);
    }
    indicator.style.left=Math.max(0,lineLeft)+'px';

    // dropIdx を計算（元のインデックス空間に戻す）
    const otherPids=tabs.map(t=>t.dataset.pid);
    if(insertBefore<0){
      const lastPid=otherPids[otherPids.length-1];
      dropIdx=data.processes.findIndex(p=>p.id===lastPid)+1;
      if(origIdx<=dropIdx-1) dropIdx--;
    } else {
      const beforePid=otherPids[insertBefore];
      dropIdx=data.processes.findIndex(p=>p.id===beforePid);
      if(origIdx<dropIdx) dropIdx--;
    }
    dropIdx=Math.max(0,Math.min(data.processes.length-1,dropIdx));
  }

  function onMove(e){
    if(!dragPid) return;
    e.preventDefault();
    const cx=e.touches[0].clientX;
    updateIndicator(cx);
  }

  function onEnd(){
    document.removeEventListener('touchmove',onMove);
    if(!dragPid) return;
    if(indicator){ indicator.remove(); indicator=null; }
    getTabs().forEach(t=>{ t.classList.remove('dragging-src'); });
    if(dropIdx!==origIdx && dropIdx>=0){
      if(origBtn) origBtn._wasDragged=true;
      const proc=data.processes.splice(origIdx,1)[0];
      data.processes.splice(dropIdx,0,proc);
      saveData(); renderTabs(); updateHeadSub();
    }
    dragPid=null; origBtn=null; origIdx=-1; dropIdx=-1;
  }

  bar.addEventListener('touchstart',e=>{
    const btn=e.target.closest('[data-pid]'); if(!btn) return;
    const t=e.touches[0];
    touchSX=t.clientX; touchSY=t.clientY;
    lpt=setTimeout(()=>{ lpt=null; enter(btn,touchSX,touchSY); },500);
  },{passive:true});
  bar.addEventListener('touchmove',e=>{
    if(!lpt) return;
    const t=e.touches[0];
    if(Math.abs(t.clientX-touchSX)>6||Math.abs(t.clientY-touchSY)>6) cancelLP();
  },{passive:true});
  bar.addEventListener('touchend',cancelLP);
  bar.addEventListener('touchcancel',cancelLP);
})();

/* ===== サブタブ長押し並び替え（挿入マーカー方式） ===== */
(()=>{
  const sb=()=>$("subtabbar");
  let dragSid=null,origBtn=null,origIdx=-1,dropIdx=-1;
  let dragGhost=null,indicator=null,ghostW=0,ghostH=0;
  let lpt=null,touchSX=0,touchSY=0;

  const getTabs=()=>Array.from(sb().querySelectorAll('[data-sid]'));
  const cancelLP=()=>{ if(lpt){clearTimeout(lpt);lpt=null;} };

  function enter(btn,cx,cy){
    if(!editMode) return;
    if(navigator.vibrate) navigator.vibrate(40);
    dragSid=btn.dataset.sid;
    origBtn=btn;
    const p=curProcess(); if(!p) return;
    origIdx=p.subtabs.findIndex(s=>s.id===dragSid);
    dropIdx=origIdx;

    const rect=btn.getBoundingClientRect();
    ghostW=rect.width; ghostH=rect.height;

    dragGhost=document.createElement('div');
    dragGhost.style.cssText=
      `position:fixed;top:${rect.top+rect.height/2-4}px;left:${cx-ghostW/2}px;`+
      `width:${ghostW}px;height:8px;pointer-events:none;z-index:999;`+
      `background:var(--accent);border-radius:4px;opacity:.9;`;
    document.body.appendChild(dragGhost);

    indicator=document.createElement('div');
    indicator.className='stab-insert-indicator';
    sb().style.position='relative';
    sb().appendChild(indicator);

    btn.classList.add('stab-drag-src');

    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd,{once:true});
    document.addEventListener('touchcancel',onEnd,{once:true});
    updateIndicator(cx);
  }

  function updateIndicator(cx){
    const tabs=getTabs().filter(t=>t!==origBtn);
    const barRect=sb().getBoundingClientRect();
    let insertBefore=-1;
    for(let i=0;i<tabs.length;i++){
      const r=tabs[i].getBoundingClientRect();
      if(cx<r.left+r.width/2){ insertBefore=i; break; }
    }
    let lineLeft;
    if(tabs.length===0){ lineLeft=4; }
    else if(insertBefore===0){ lineLeft=tabs[0].getBoundingClientRect().left-barRect.left-6; }
    else if(insertBefore>0){ lineLeft=tabs[insertBefore-1].getBoundingClientRect().right-barRect.left+3; }
    else{ lineLeft=tabs[tabs.length-1].getBoundingClientRect().right-barRect.left+3; }
    indicator.style.left=Math.max(0,lineLeft)+'px';

    const p=curProcess(); if(!p) return;
    const otherSids=tabs.map(t=>t.dataset.sid);
    if(insertBefore<0){
      const lastSid=otherSids[otherSids.length-1];
      dropIdx=p.subtabs.findIndex(s=>s.id===lastSid)+1;
      if(origIdx<=dropIdx-1) dropIdx--;
    } else {
      const beforeSid=otherSids[insertBefore];
      dropIdx=p.subtabs.findIndex(s=>s.id===beforeSid);
      if(origIdx<dropIdx) dropIdx--;
    }
    dropIdx=Math.max(0,Math.min(p.subtabs.length-1,dropIdx));
  }

  function onMove(e){
    if(!dragSid) return;
    e.preventDefault();
    const cx=e.touches[0].clientX;
    dragGhost.style.left=(cx-ghostW/2)+'px';
    updateIndicator(cx);
  }

  function onEnd(){
    document.removeEventListener('touchmove',onMove);
    if(!dragSid) return;
    if(dragGhost){ dragGhost.remove(); dragGhost=null; }
    if(indicator){ indicator.remove(); indicator=null; }
    getTabs().forEach(t=>t.classList.remove('stab-drag-src'));
    const p=curProcess();
    if(p && dropIdx!==origIdx && dropIdx>=0){
      const sub=p.subtabs.splice(origIdx,1)[0];
      p.subtabs.splice(dropIdx,0,sub);
      touch(p); saveData(); renderProcessHead();
    }
    dragSid=null; origBtn=null; origIdx=-1; dropIdx=-1;
  }

  document.addEventListener('touchstart',e=>{
    if(!editMode) return;
    const bar=sb(); if(!bar) return;
    const btn=e.target.closest('[data-sid]');
    if(!btn||!bar.contains(btn)) return;
    const t=e.touches[0];
    touchSX=t.clientX; touchSY=t.clientY;
    lpt=setTimeout(()=>{ lpt=null; enter(btn,touchSX,touchSY); },500);
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!lpt) return;
    const t=e.touches[0];
    if(Math.abs(t.clientX-touchSX)>6||Math.abs(t.clientY-touchSY)>6) cancelLP();
  },{passive:true});
  document.addEventListener('touchend',cancelLP);
  document.addEventListener('touchcancel',cancelLP);
})();

(()=>{
  const lb=$("lightbox");
  const img=$("lightboxImg");
  const inner=$("lightboxInner");
  let scale=1,tx=0,ty=0;
  let lastDist=0,lastMid={x:0,y:0};
  let ptrs={};

  function applyTransform(){
    inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }

  lb.addEventListener("touchstart",e=>{
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t=>{ ptrs[t.identifier]={x:t.clientX,y:t.clientY}; });
    const pts=Object.values(ptrs);
    if(pts.length===2){
      lastDist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      lastMid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      _lastTap=0; // マルチタッチ開始でダブルタップ判定をリセット
    }
  },{passive:false});

  lb.addEventListener("touchmove",e=>{
    e.preventDefault();
    // 古い位置を保存してから更新
    const old={};
    Array.from(e.changedTouches).forEach(t=>{
      if(ptrs[t.identifier]) old[t.identifier]=ptrs[t.identifier];
      ptrs[t.identifier]={x:t.clientX,y:t.clientY};
    });
    const pts=Object.values(ptrs);
    if(pts.length===2){
      const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      if(lastDist>0){
        const ratio=dist/lastDist;
        scale=Math.min(Math.max(scale*ratio,0.5),6);
        tx+=(mid.x-lastMid.x);
        ty+=(mid.y-lastMid.y);
      }
      lastDist=dist; lastMid=mid;
      applyTransform();
    } else if(pts.length===1){
      const t=e.changedTouches[0];
      const prev=old[t.identifier]; // 更新前の位置を参照
      if(prev){
        tx+=t.clientX-prev.x;
        ty+=t.clientY-prev.y;
        applyTransform();
      }
    }
  },{passive:false});

  let _lastTap=0;
  lb.addEventListener("touchend",e=>{
    Array.from(e.changedTouches).forEach(t=>delete ptrs[t.identifier]);
    lastDist=0;
    if(Object.keys(ptrs).length>0) return; // まだ指が残っている
    // ダブルタップ: 1倍↔2倍トグル
    if(e.changedTouches.length===1){
      const now=Date.now();
      if(now-_lastTap<300){
        if(scale>1.05){ scale=1;tx=0;ty=0; }
        else {
          const t=e.changedTouches[0];
          const cx=t.clientX-lb.clientWidth/2;
          const cy=t.clientY-lb.clientHeight/2;
          scale=2.5; tx=-cx*(scale-1); ty=-cy*(scale-1);
        }
        applyTransform();
        _lastTap=0;
      } else { _lastTap=now; }
    }
  },{passive:false});
})();

$("importInput").addEventListener("change",async e=>{
  const file=e.target.files[0]; if(!file) return;
  if(!confirm("⚠️ 全データを置き換えます\n\n今のデータはすべて消えて、ファイルの内容に入れ替わります。\n\n用途：機種変更・バックアップからの復元\n（手順書の共有には「工程を追加する」を使ってください）\n\n事前に「データを書き出す」でバックアップ推奨\n\n本当に実行しますか？")) return;
  try{
    const txt=await file.text();
    let bundle;
    try{ bundle=JSON.parse(txt); }catch(e){ throw new Error("JSONの解析に失敗しました"); }
    if(typeof bundle!=="object"||bundle===null) throw new Error("ファイル形式が違います");
    // dataが無い場合は空で初期化（古い形式対応）
    if(!bundle.data) bundle.data={ processes:[], activeTab:null };
    if(!Array.isArray(bundle.data.processes)) bundle.data.processes=[];
    // 写真をDBへ
    const photos=bundle.photos||{};
    await clearStore("photos"); photoCache={};
    for(const k in photos){ await idbSet("photos",k,photos[k]); photoCache[k]=photos[k]; }
    // homeApps・homeBuiltins・builtinOverridesを復元（新形式のみ）
    if(bundle.homeApps){
      homeApps=bundle.homeApps;
      await saveHomeApps();
    }
    if(bundle.homeBuiltins){
      homeBuiltins=bundle.homeBuiltins;
      await saveHomeBuiltins();
    }
    if(bundle.builtinOverrides){
      builtinOverrides=bundle.builtinOverrides;
      await idbSet("meta","builtinOverrides",builtinOverrides);
    }
    if(bundle.homeOrder){
      homeOrder=bundle.homeOrder;
      await saveHomeOrder();
    }
    // 新形式(allData)なら全モジュールのデータをまとめて復元
    if(bundle.allData&&typeof bundle.allData==="object"&&Object.keys(bundle.allData).length){
      for(const dk in bundle.allData){ await idbSet("meta",dk,bundle.allData[dk]); }
      data=null; dataModule=null;
      showHome();
      toast("読み込みました（全アプリ復元）");
      return;
    }
    // データを正しいアプリキーへ復元
    // targetModuleがない古いバックアップはhomeAppsの最初のアプリをフォールバックに使う
    const restoreKey=bundle.targetModule||currentModule||(bundle.homeApps&&bundle.homeApps[0]?.key)||null;
    const restoreCfg=getModuleConfig(restoreKey);
    const restoreDataKey=restoreCfg?.dataKey||"data";
    data=bundle.data;
    dataModule=restoreKey;
    await idbSet("meta",restoreDataKey,data);
    if(restoreKey&&restoreKey===currentModule){
      renderAll();
    } else {
      showHome();
    }
    toast("読み込みました");
  }catch(err){ toast("読み込みに失敗："+err.message); }
});

    // 追加前のスナップショットを保存
    mergeUndoSnapshot=JSON.parse(JSON.stringify(data));

    const photos=bundle.photos||{};
    for(const k in photos){ await idbSet("photos",k,photos[k]); photoCache[k]=photos[k]; }
    // 工程を追加（IDが重複している場合は新IDを付与）
    const existingIds=new Set(data.processes.map(p=>p.id));

      await saveData(); renderAll(); toast("元に戻しました");
    });

});

function clearStore(store){
  return new Promise((res,rej)=>{
    const t=db.transaction(store,"readwrite").objectStore(store).clear();
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  });
}

/* ホームタイルの並び替え（編集モードで≡をドラッグ） */
let _homeDrag=null,_homeJustDragged=false;
function homeTileDragStart(e,tile){
  e.preventDefault(); e.stopPropagation();
  const grid=$("homeGrid");
  _homeDrag={tile,grid};
  tile.classList.add("dragging");
  const move=ev=>{
    if(!_homeDrag) return;
    ev.preventDefault();
    const y=ev.clientY;
    const others=[...grid.querySelectorAll(".home-tile")].filter(t=>t!==tile);
    for(const t of others){
      const box=t.getBoundingClientRect();
      if(y>box.top&&y<box.bottom){
        if(y<box.top+box.height/2) grid.insertBefore(tile,t);
        else grid.insertBefore(tile,t.nextSibling);
        break;
      }
    }
  };
  const up=()=>{
    document.removeEventListener("pointermove",move);
    document.removeEventListener("pointerup",up);
    document.removeEventListener("pointercancel",up);
    if(!_homeDrag) return;
    _homeDrag.tile.classList.remove("dragging");
    homeOrder=[...grid.querySelectorAll(".home-tile")].map(t=>t.dataset.module);
    saveHomeOrder();
    _homeDrag=null;
    _homeJustDragged=true; setTimeout(()=>{ _homeJustDragged=false; },350);
  };
  document.addEventListener("pointermove",move,{passive:false});
  document.addEventListener("pointerup",up);
  document.addEventListener("pointercancel",up);
}

// canvasにアノテーションを描く共通関数
function drawAnnosOnCanvas(ctx,annotations,iw,ih){
  // 編集画面と同じく (x,y) は「記号の中心」。左上基準で描くと半サイズ右下にずれるので注意
  const base=Math.min(iw,ih);
  annotations.forEach(a=>{
    const x=a.x/100*iw, y=a.y/100*ih;
    const sizePx=Math.max(14,(a.size/100)*base);
    const col=a.color||'#ff3b30';
    ctx.save(); ctx.fillStyle=col; ctx.strokeStyle=col;
    if(a.type==='circle'){
      ctx.lineWidth=Math.max(2,base*0.006);
      ctx.beginPath(); ctx.arc(x,y,sizePx/2,0,Math.PI*2); ctx.stroke();
    } else if(a.type==='num'){
      ctx.beginPath(); ctx.arc(x,y,sizePx/2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font=`bold ${sizePx*0.6}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(a.text||'',x,y);
    } else if(a.type==='text'){
      ctx.font=`bold ${sizePx}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(2,sizePx*0.12);
      ctx.strokeText(a.text||'',x,y); ctx.fillText(a.text||'',x,y);
    } else if(a.type==='arrow'){
      ctx.font=`${sizePx*1.4}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(2,sizePx*0.1);
      ctx.strokeText('➜',x,y); ctx.fillText('➜',x,y);
    } else if(a.type==='rect'){
      const wPx=Math.max(20,(a.size/100)*iw);
      const hPx=Math.max(10,wPx*0.6*(a.hRatio||1));
      ctx.lineWidth=Math.max(2,base*0.005);
      ctx.strokeRect(x-wPx/2,y-hPx/2,wPx,hPx);
    }
    ctx.restore();
  });
}

// アノテーションをcanvasに焼き込んだ画像データURLを返す（EXIF回転対応）
async function getPhotoWithAnnos(photoId,annotations){
  const src=photoCache[photoId];
  if(!src) return null;

  // createImageBitmap + imageOrientation でEXIF回転を正しく反映
  try{
    const resp=await fetch(src);
    const blob=await resp.blob();
    const bitmap=await createImageBitmap(blob,{imageOrientation:'from-image'});
    const c=document.createElement('canvas');
    c.width=bitmap.width; c.height=bitmap.height;
    const ctx=c.getContext('2d');
    ctx.drawImage(bitmap,0,0);
    bitmap.close();
    if(annotations&&annotations.length) drawAnnosOnCanvas(ctx,annotations,c.width,c.height);
    return c.toDataURL('image/jpeg',0.92);
  }catch(e){
    // フォールバック：旧来のImage()方式
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        c.width=img.naturalWidth; c.height=img.naturalHeight;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0);
        if(annotations&&annotations.length) drawAnnosOnCanvas(ctx,annotations,c.width,c.height);
        resolve(c.toDataURL('image/jpeg',0.92));
      };
      img.onerror=()=>resolve(src);
      img.src=src;
    });
  }
}

// 表形式(作業標準書スタイル)のDOM部品を生成 — 印刷とPDF出力で共用
async function buildPrintDom(p, inputDate){
  const appName=$("appTitle").textContent||"手順書";
  const els=[];
  const tbar=document.createElement('div'); tbar.className='plog-title-bar';
  tbar.innerHTML=`<span class="plog-title-name">${escapeHtml(p.name)}</span><span class="plog-title-date">作成日：${escapeHtml(inputDate)}</span>`;
  els.push(tbar);

  const subtabs=p.subtabs||[];
  for(const s of subtabs){
    if(subtabs.length>1){
      const sh=document.createElement('div'); sh.className='plog-subtab-header';
      sh.textContent=s.name||''; els.push(sh);
    }
    const table=document.createElement('table'); table.className='pst';
    table.innerHTML='<thead><tr><th class="pst-no">No</th><th class="pst-pic">写真</th><th>内容</th></tr></thead>';
    const tbody=document.createElement('tbody');
    let no=0;
    for(const st of (s.steps||[])){
      no++;
      const tr=document.createElement('tr');
      const tdNo=document.createElement('td'); tdNo.className='pst-no'; tdNo.textContent=no;
      const tdPic=document.createElement('td'); tdPic.className='pst-pic';
      const picBox=document.createElement('div'); picBox.className='pst-picbox'; tdPic.appendChild(picBox);
      const tdTxt=document.createElement('td'); tdTxt.className='pst-txt';
      const txtBox=document.createElement('div'); txtBox.className='pst-txtbox'; tdTxt.appendChild(txtBox);
      if(st.photoId&&photoCache[st.photoId]){
        const src=await getPhotoWithAnnos(st.photoId,st.annotations||[]);
        if(src){ const im=document.createElement('img'); im.src=src; picBox.appendChild(im); }
      }
      if(st.title){ const t=document.createElement('div'); t.className='pst-title'; t.textContent=st.title; txtBox.appendChild(t); }
      if(st.text){ const t=document.createElement('div'); t.innerHTML=textToDisplay(st.text); txtBox.appendChild(t); }
      let si=0;
      for(const ss of (st.subSteps||[])){
        si++;
        if(ss.title||ss.text){
          const box=document.createElement('div'); box.className='pst-sub';
          const lbl=document.createElement('span'); lbl.className='pst-sub-no'; lbl.textContent=no+'-'+si;
          box.appendChild(lbl);
          const bd=document.createElement('span');
          let inner='';
          if(ss.title) inner+='<b>'+escapeHtml(ss.title)+'</b>　';
          if(ss.text) inner+=textToDisplay(ss.text);
          bd.innerHTML=inner; box.appendChild(bd);
          txtBox.appendChild(box);
        }
        if(ss.photoId&&photoCache[ss.photoId]){
          const src=await getPhotoWithAnnos(ss.photoId,ss.annotations||[]);
          if(src){
            const wrap=document.createElement('div'); wrap.className='pst-subpic';
            const im=document.createElement('img'); im.src=src;
            const cap=document.createElement('div'); cap.className='pst-subpic-cap'; cap.textContent='▲ '+no+'-'+si;
            wrap.appendChild(im); wrap.appendChild(cap);
            picBox.appendChild(wrap);
          }
        }
      }
      tr.appendChild(tdNo); tr.appendChild(tdPic); tr.appendChild(tdTxt);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    els.push(table);
  }
  return els;
}

// 表形式で印刷(ブラウザの印刷機能)
async function printPhotoLog(p){
  const defaultDate=fmtDate(p.updatedAt||data.updatedAt);
  const inputDate=prompt("作成日を入力してください（変更可）",defaultDate);
  if(inputDate===null) return;
  const plogEl=$("plogContainer");
  plogEl.innerHTML='';
  const els=await buildPrintDom(p, inputDate||defaultDate);
  els.forEach(el=>plogEl.appendChild(el));

  document.body.setAttribute('data-plog','1');
  // 片付けは「印刷が終わってから」(iPhoneはprint()が即戻るため)
  const cleanup=()=>{
    document.body.removeAttribute('data-plog');
    plogEl.innerHTML='';
    window.removeEventListener('afterprint',cleanup);
  };
  window.addEventListener('afterprint',cleanup);
  setTimeout(cleanup, 120000);
  window.print();
}

/* ===== PDF出力(iPhoneからでもURL・日付なしのきれいな印刷ができる) ===== */
function loadScriptOnce(src){
  return new Promise((res,rej)=>{
    const sc=document.createElement('script'); sc.src=src;
    sc.onload=res; sc.onerror=()=>rej(new Error(src+" の読み込みに失敗"));
    document.head.appendChild(sc);
  });
}
async function loadPdfLibs(){
  if(typeof html2canvas==='undefined') await loadScriptOnce('./html2canvas.min.js');
  if(!(window.jspdf&&window.jspdf.jsPDF)) await loadScriptOnce('./jspdf.umd.min.js');
}

async function exportPdf(p){
  const defaultDate=fmtDate(p.updatedAt||data.updatedAt);
  const inputDate=prompt("作成日を入力してください（変更可）",defaultDate);
  if(inputDate===null) return;
  toast("PDFを作成中…しばらくお待ちください");
  let host=null;
  try{
    await loadPdfLibs();
    const els=await buildPrintDom(p, inputDate||defaultDate);

    // A4(96dpi=794×1123px)のページに行単位で詰めていく
    const PAGE_W=794, PAGE_H=1123, PAD=22;
    host=document.createElement('div');
    host.style.cssText='position:fixed;left:-12000px;top:0;background:#fff;';
    document.body.appendChild(host);
    const pages=[];
    let content=null;
    const newPage=()=>{
      const page=document.createElement('div');
      page.style.cssText=`width:${PAGE_W}px;height:${PAGE_H}px;background:#fff;box-sizing:border-box;padding:${PAD}px;overflow:hidden;`;
      content=document.createElement('div');
      page.appendChild(content); host.appendChild(page); pages.push(page);
    };
    const fits=()=>content.scrollHeight<=PAGE_H-PAD*2;
    newPage();
    for(const el of els){
      if(el.tagName==='TABLE'){
        const thead=el.querySelector('thead');
        const rows=[...el.querySelectorAll('tbody tr')];
        let t=el.cloneNode(false); t.appendChild(thead.cloneNode(true));
        let tb=document.createElement('tbody'); t.appendChild(tb);
        content.appendChild(t);
        if(!fits()){ t.remove(); newPage(); content.appendChild(t); }
        for(const row of rows){
          tb.appendChild(row);
          if(!fits()){
            row.remove();
            newPage();
            t=el.cloneNode(false); t.appendChild(thead.cloneNode(true));
            tb=document.createElement('tbody'); t.appendChild(tb);
            content.appendChild(t);
            tb.appendChild(row);
          }
        }
      } else {
        content.appendChild(el);
        if(!fits()){ el.remove(); newPage(); content.appendChild(el); }
      }
    }
    // 画像の読み込み待ち
    await Promise.all([...host.querySelectorAll('img')].map(im=>im.complete?null:new Promise(r=>{im.onload=r; im.onerror=r;})));

    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    for(let i=0;i<pages.length;i++){
      const canvas=await html2canvas(pages[i],{scale:3,backgroundColor:'#ffffff',logging:false});
      if(i>0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,210,297);
    }
    host.remove(); host=null;

    const blob=pdf.output('blob');
    const fname=(p.name||'手順書')+'.pdf';
    showPdfSheet(blob,fname,pages.length);
  }catch(err){
    if(host) host.remove();
    toast("PDF作成に失敗: "+err.message);
  }
}

// 生成後の共有/保存シート(iPhoneのシェアはユーザー操作直後でないと動かないため、ボタンを挟む)
function showPdfSheet(blob,fname,pageCount){
  const old=$("pdfSheetOverlay"); if(old) old.remove();
  const ov=document.createElement('div');
  ov.id='pdfSheetOverlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99999;display:flex;align-items:flex-end;justify-content:center;';
  const canShare=!!(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],fname,{type:'application/pdf'})]}));
  ov.innerHTML=`<div style="background:#fff;width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:20px 16px 32px;">
    <p style="font-weight:700;font-size:16px;margin:0 0 4px;">📄 PDFができました（全${pageCount}ページ）</p>
    <p style="font-size:12px;color:#64748b;margin:0 0 14px;">URL・日付は入っていません。共有からエプソンのアプリやプリンタに送れます。</p>
    ${canShare?'<button id="_pdfShare" style="width:100%;margin-bottom:10px;padding:14px;border-radius:10px;background:#1d4ed8;color:#fff;border:none;font-size:15px;font-weight:700;">📤 共有する（印刷・保存）</button>':''}
    <button id="_pdfSave" style="width:100%;margin-bottom:10px;padding:14px;border-radius:10px;background:#f1f5f9;color:#1f2937;border:none;font-size:15px;font-weight:700;">💾 ファイルとして保存</button>
    <button id="_pdfCancel" style="width:100%;padding:12px;border-radius:10px;background:#fff;color:#64748b;border:1px solid #e2e8f0;font-size:15px;">閉じる</button>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  const sh=$("_pdfShare");
  if(sh) sh.onclick=async()=>{
    try{
      await navigator.share({files:[new File([blob],fname,{type:'application/pdf'})],title:fname});
      close();
    }catch(e){ if(e.name!=='AbortError') toast('共有できませんでした'); }
  };
  $("_pdfSave").onclick=()=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
    close(); toast('PDFを保存しました 📄');
  };
}

async function buildExcelBlob(proc,sub,mod){
  const wb=new ExcelJS.Workbook();
  const sheetName=(proc.name||"手順").slice(0,31);
  const ws=wb.addWorksheet(sheetName);
  // A4縦・印刷設定
  ws.pageSetup={paperSize:9,orientation:"portrait",fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.5,right:0.5,top:0.75,bottom:0.75,header:0.3,footer:0.3}};
  ws.pageSetup.printTitlesRow="$1:$2"; // 2枚目以降もタイトル行・ヘッダー行を繰り返す
  const updDate=fmtDate(proc.updatedAt||data.updatedAt);
  ws.mergeCells("A1:D1");
  const tc=ws.getCell("A1");
  tc.value=`${mod.title} ／ ${proc.name}`;
  tc.font={name:"メイリオ",size:14,bold:true,color:{argb:"FFFFFFFF"}};
  tc.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF1F6FEB"}};
  tc.alignment={horizontal:"center",vertical:"middle"};
  ws.getRow(1).height=32;
  ws.getCell("E1").value="更新日："+updDate;
  ws.getCell("E1").font={name:"メイリオ",size:10,color:{argb:"FF666666"}};
  ws.getCell("E1").alignment={horizontal:"right",vertical:"middle"};
  const headers=["No.","手順内容","メモ・詳細","サブ手順","チェック"];
  ["A2","B2","C2","D2","E2"].forEach((addr,i)=>{
    const c=ws.getCell(addr);
    c.value=headers[i];
    c.font={name:"メイリオ",size:10,bold:true,color:{argb:"FFFFFFFF"}};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF334155"}};
    c.alignment={horizontal:"center",vertical:"middle"};
    c.border={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
  });
  ws.getRow(2).height=22;
  ws.getColumn(1).width=5; ws.getColumn(2).width=28; ws.getColumn(3).width=24; ws.getColumn(4).width=20; ws.getColumn(5).width=8;
  // A4縦1ページに収まる行数を計算（ポイント換算）
  // 印刷可能高さ≒693pt（A4 297mm - 上下マージン0.75inch×2）、タイトル32+ヘッダー22=54pt
  const ROW_H=40, PAGE_H=693, HEADER_H=54, ROWS_PER_PAGE=Math.floor((PAGE_H-HEADER_H)/ROW_H);
  let rowIdx=3, pageRowCount=0;
  (sub.steps||[]).forEach((st,i)=>{
    if(pageRowCount>0 && pageRowCount>=ROWS_PER_PAGE){
      ws.getRow(rowIdx-1).addPageBreak();
      pageRowCount=0;
    }
    const bg=i%2===1?"FFF8FAFC":"FFFFFFFF";
    ws.getRow(rowIdx).height=ROW_H;
    const subText=(st.subSteps||[]).map((ss,j)=>`${i+1}-${j+1}. ${ss.text||""}`).join("\n");
    [i+1, st.text||"", st.note||"", subText, "□"].forEach((v,ci)=>{
      const c=ws.getCell(rowIdx,ci+1);
      c.value=v; c.font={name:"メイリオ",size:10};
      c.alignment={wrapText:true,vertical:"top",horizontal:ci===0||ci===4?"center":"left"};
      c.fill={type:"pattern",pattern:"solid",fgColor:{argb:bg}};
      c.border={top:{style:"thin",color:{argb:"FFE2E8F0"}},bottom:{style:"thin",color:{argb:"FFE2E8F0"}},left:{style:"thin",color:{argb:"FFE2E8F0"}},right:{style:"thin",color:{argb:"FFE2E8F0"}}};
    });
    rowIdx++; pageRowCount++;
  });
  const buf=await wb.xlsx.writeBuffer();
  return new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
}

    ws.getColumn(1).width=5; ws.getColumn(2).width=20;
    ws.getColumn(3).width=26; ws.getColumn(4).width=7; ws.getColumn(5).width=20;
    // 写真行は高さ100pt≒35mm。A4縦で1ページ約6〜7行が目安
    const ROW_H=100, PAGE_H=693, HEADER_H=54, ROWS_PER_PAGE=Math.floor((PAGE_H-HEADER_H)/ROW_H);
    let rowIdx=3, pageRowCount=0;
    for(let i=0;i<sub.steps.length;i++){
      const st=sub.steps[i];
      if(pageRowCount>0 && pageRowCount>=ROWS_PER_PAGE){
        ws.getRow(rowIdx-1).addPageBreak();
        pageRowCount=0;
      }
      ws.getRow(rowIdx).height=ROW_H;
      ws.getCell(`A${rowIdx}`).value=i+1;
      ws.getCell(`A${rowIdx}`).alignment={horizontal:"center",vertical:"top"};
      ws.getCell(`A${rowIdx}`).font={name:"メイリオ",size:10};
      if(st.photoId&&photoCache[st.photoId]){
        try{
          const dataUrl=photoCache[st.photoId];
          const base64=dataUrl.split(",")[1];
          const ext=dataUrl.startsWith("data:image/png")?"png":"jpeg";
          const imgId=wb.addImage({base64,extension:ext});
          ws.addImage(imgId,{tl:{col:1,row:rowIdx-1},br:{col:2,row:rowIdx},editAs:"oneCell"});
        }catch(e){}
      }
      ws.mergeCells(`C${rowIdx}:D${rowIdx}`);
      const cc=ws.getCell(`C${rowIdx}`);
      cc.value=(st.title?(st.title+"\n"):"")+(st.text||"");
      cc.alignment={wrapText:true,vertical:"top"}; cc.font={name:"メイリオ",size:10};
      const subText=(st.subSteps||[]).map((ss,j)=>`${i+1}-${j+1} ${ss.title?ss.title+": ":""}${ss.text||""}`).join("\n");
      ws.getCell(`E${rowIdx}`).value=subText||"";
      ws.getCell(`E${rowIdx}`).alignment={wrapText:true,vertical:"top"};

      ["A","B","C","E"].forEach(col=>{

  }catch(e){ console.error(e); toast("Excel出力エラー："+e.message); }
}

   PowerPointエクスポート
   ============================================================ */
async function bakeAnnotations(dataUrl, annotations){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      cv.width=img.naturalWidth; cv.height=img.naturalHeight;
      const ctx=cv.getContext('2d');
      ctx.drawImage(img,0,0);
      const iw=cv.width, ih=cv.height, base=Math.min(iw,ih);
      (annotations||[]).forEach(a=>{
        const sizePx=Math.max(14,(a.size/100)*base);
        const x=(a.x/100)*iw, y=(a.y/100)*ih;
        ctx.strokeStyle='#ff2222'; ctx.fillStyle='#ff2222';
        if(a.type==='circle'){
          const r=sizePx/2;
          ctx.lineWidth=Math.max(2,base*0.006);
          ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.stroke();
        } else if(a.type==='rect'){
          const wp=Math.max(20,(a.size/100)*iw), hp=Math.max(10,wp*0.6*(a.hRatio||1));
          ctx.lineWidth=Math.max(2,base*0.005);
          ctx.strokeRect(x,y,wp,hp);
        } else if(a.type==='num'){
          const r=sizePx/2;
          ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff';
          ctx.font=`bold ${Math.round(sizePx*0.55)}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(a.text||'',x+r,y+r);
          ctx.textAlign='left'; ctx.textBaseline='alphabetic';
          ctx.fillStyle='#ff2222';
        } else if(a.type==='text'){
          ctx.font=`bold ${Math.round(sizePx)}px sans-serif`;
          ctx.shadowColor='rgba(255,255,255,.85)'; ctx.shadowBlur=3;
          ctx.fillText(a.text||'',x,y+sizePx); ctx.shadowBlur=0;
        } else if(a.type==='arrow'){
          ctx.font=`${Math.round(sizePx*1.4)}px sans-serif`;
          ctx.shadowColor='rgba(255,255,255,.85)'; ctx.shadowBlur=3;
          ctx.fillText('➜',x,y+sizePx*1.4); ctx.shadowBlur=0;
        }
      });
      resolve({dataUrl:cv.toDataURL('image/jpeg',0.92),w:iw,h:ih});
    };
    img.src=dataUrl;
  });
}

async function exportToPptx(proc,sub,mod){
  hideSheets();
  toast('PowerPoint作成中…');
  try{
    if(typeof PptxGenJS==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='./pptxgen.bundle.js';
        s.onload=res; s.onerror=()=>rej(new Error('ライブラリの読み込みに失敗'));
        document.head.appendChild(s);
      });
    }
    const pptx=new PptxGenJS();
    pptx.defineLayout({name:'A4P',width:7.48,height:10.58});
    pptx.layout='A4P';
    const updDate=fmtDate(proc.updatedAt||data.updatedAt);
    const steps=sub.steps||[];

    // ── タイトルスライド ──
    {
      const sl=pptx.addSlide();
      sl.background={color:'F1F5F9'};
      sl.addShape('rect',{x:0,y:3.2,w:7.48,h:3.2,fill:{color:'1F6FEB'}});
      sl.addText(mod.title,{x:0.5,y:3.35,w:6.48,h:0.5,fontSize:12,color:'CCE4FF',align:'center',valign:'middle'});
      sl.addText(proc.name,{x:0.5,y:3.9,w:6.48,h:1.4,fontSize:24,bold:true,color:'FFFFFF',align:'center',valign:'middle'});
      sl.addText(`更新日：${updDate}　　全 ${steps.length} 手順`,{x:0.5,y:5.5,w:6.48,h:0.4,fontSize:11,color:'CCE4FF',align:'center'});
    }

    // ── 手順スライド（1手順=1スライド）──
    for(let i=0;i<steps.length;i++){
      const st=steps[i];
      const sl=pptx.addSlide();
      sl.background={color:'FFFFFF'};

      // タイトルバー
      sl.addShape('rect',{x:0,y:0,w:7.48,h:0.52,fill:{color:'1F6FEB'}});
      sl.addText(`${i+1}`,{x:0.12,y:0,w:0.5,h:0.52,fontSize:18,bold:true,color:'FFFFFF',valign:'middle'});
      sl.addText(st.title||'（タイトルなし）',{x:0.65,y:0,w:5.8,h:0.52,fontSize:14,bold:true,color:'FFFFFF',valign:'middle'});
      sl.addText(`${i+1} / ${steps.length}`,{x:6.5,y:0,w:0.9,h:0.52,fontSize:9,color:'CCE4FF',align:'right',valign:'middle'});

      const footerY=10.22;
      let cy=0.62;

      // 写真（アノテーション焼き込み）
      if(st.photoId&&photoCache[st.photoId]){
        const baked=await bakeAnnotations(photoCache[st.photoId],st.annotations||[]);
        const maxW=7.08,maxH=5.0;
        const scale=Math.min(maxW/baked.w,maxH/baked.h);
        const dw=baked.w*scale, dh=baked.h*scale;
        const ix=(7.48-dw)/2;
        sl.addImage({data:baked.dataUrl,x:ix,y:cy,w:dw,h:dh});
        cy+=dh+0.18;
      }

      // 説明テキスト
      if(st.text&&cy<footerY-0.5){
        const th=Math.min(1.6,footerY-cy-0.1);
        sl.addText(st.text,{x:0.2,y:cy,w:7.08,h:th,fontSize:11,color:'1e293b',valign:'top',wrap:true});
        cy+=th;
      }

      // サブ手順
      if(st.subSteps&&st.subSteps.length>0&&cy<footerY-0.3){
        const remH=footerY-cy-0.1;
        const runs=[];
        st.subSteps.forEach((ss,j)=>{
          if(j>0) runs.push({text:'\n',options:{fontSize:4}});
          runs.push({text:`${i+1}-${j+1}  ${ss.title||''}`,options:{bold:true,fontSize:10.5,color:'1e293b'}});
          if(ss.text) runs.push({text:`\n   ${ss.text}`,options:{fontSize:10,color:'475569'}});
        });
        sl.addText(runs,{x:0.2,y:cy,w:7.08,h:remH,fontSize:10.5,valign:'top',wrap:true});
      }

      // フッター
      sl.addShape('rect',{x:0.15,y:footerY,w:7.18,h:0.008,fill:{color:'CBD5E1'},line:{color:'CBD5E1',width:0}});
      sl.addText(`${mod.title}　${proc.name}　更新日：${updDate}`,{
        x:0.15,y:footerY+0.02,w:7.18,h:0.3,fontSize:8,color:'94A3B8',align:'center'});
    }

    // ── 出力 ──
    const updStr=updDate.replace(/\//g,'-');
    const fileName=`${mod.title}_${proc.name}_${updStr}.pptx`;
    const blob=await pptx.write('blob');
    const file=new File([blob],fileName,{type:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:fileName});
    } else {
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=fileName; a.click();
      URL.revokeObjectURL(url);
    }
    toast('PowerPoint出力完了');
  }catch(e){
    if(e.name!=='AbortError'){ console.error(e); toast('PowerPoint出力エラー：'+e.message); }
  }
}

(async function init(){

      await idbSet("meta","homeBuiltins",[]);
      await idbSet("meta","data",null);
      history.replaceState(null,"",location.pathname);
    }

    builtinOverrides=await idbGet("meta","builtinOverrides")||{};
    homeOrder=await idbGet("meta","homeOrder")||[];
    // v2: 旧移行データを強制リセット（意図せずprimeが表示される問題を防ぐ）
    const builtinsVer=await idbGet("meta","homeBuiltinsVer");
    if(builtinsVer!==2){
      homeBuiltins=[];
      await idbSet("meta","homeBuiltins",[]);
      await idbSet("meta","homeBuiltinsVer",2);
    } else {
      homeBuiltins=await idbGet("meta","homeBuiltins")||[];
    }

  }catch(e){
    const _el=$("docInfoLabel"); if(_el) _el.textContent="起動エラー："+(e.message||e);
  }
})();

// サービスワーカー登録（オフライン対応）+ 更新の自動チェック
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(reg=>{
      // アプリを開き直した時・前面に戻した時に更新を確認
      const check=()=>{ try{ reg.update(); }catch(e){} };
      document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") check(); });
      check();
    }).catch(()=>{});
  });
  // 新しいバージョンが有効になったら更新バナーを表示(編集中の作業を守るため自動リロードはしない)
  let _updBannerShown=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(_updBannerShown) return; _updBannerShown=true;
    const b=document.createElement("div");
    b.style.cssText="position:fixed;left:12px;right:12px;bottom:14px;z-index:99999;background:#1f6feb;color:#fff;border-radius:12px;padding:13px 16px;font-size:14px;font-weight:700;text-align:center;box-shadow:0 6px 20px rgba(31,111,235,.45);cursor:pointer;";
    b.textContent="🔄 新しいバージョンがあります — タップで更新";
    b.onclick=()=>location.reload();
    document.body.appendChild(b);
  });
}
})();
